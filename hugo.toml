baseURL = "https://qooee.net/"
languageCode = "en-au"
title = "Qooee"
theme = "ananke"
enableRobotsTXT = true
disableKinds = ["RSS", "taxonomy", "term"]

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[params]
  background_color_class = "bg-dark-green"
  body_classes = "helvetica bg-near-white"
  text_color = "near-black"

  [params.ananke]
    show_recent_posts = false

    [params.ananke.home]
      content_alignment = "left"

    [params.ananke.social.follow]
      networks = ["github", "linkedin"]

    [params.ananke.social.github]
      profilelink = "https://github.com/qooee/"

    [params.ananke.social.linkedin]
      profilelink = "https://www.linkedin.com/company/qooee/"

[menu]
  [[menu.main]]
    name = "About"
    pageRef = "/about"
    weight = 10

  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/qooee/"
    weight = 20

  [[menu.main]]
    name = "LinkedIn"
    url = "https://www.linkedin.com/company/qooee/"
    weight = 30
