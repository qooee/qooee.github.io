baseURL = "https://qooee.net/"
languageCode = "en-au"
title = "Qooee"
theme = "ananke"
enableRobotsTXT = true
disableKinds = ["RSS", "taxonomy", "term"]

[caches]
  [caches.images]
    dir = ":cacheDir/images"

[params]
  background_color_class = "bg-white"
  body_classes = "qooee-body"
  custom_css = ["qooee-home.css"]
  description = "Qooee Contacts keeps trusted professional contact details current without social noise."
  text_color = "near-black"

  [params.ananke]
    show_recent_posts = false

    [params.ananke.home]
      content_alignment = "left"

[menu]
  [[menu.main]]
    name = "Product"
    url = "/#product-preview"
    weight = 10

  [[menu.main]]
    name = "How it works"
    url = "/#how-it-works"
    weight = 20

  [[menu.main]]
    name = "Principles"
    url = "/#principles"
    weight = 30

  [[menu.main]]
    name = "Sign in"
    pageRef = "/sign-in"
    weight = 40
